services:
  # ── Research Engine ─────────────────────────────────────────────────────────
  searxng:
    build: .
    container_name: etl-research-node
    ports:
      - "${SEARXNG_PORT:-8080}:8080"
    environment:
      - SEARXNG_BASE_URL=${SEARXNG_BASE_URL}
      - SEARXNG_SECRET_KEY=${SEARXNG_SECRET_KEY}
    depends_on:
      - redis
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETGID
      - SETUID
    restart: always

  # ── Search Cache ────────────────────────────────────────────────────────────
  redis:
    image: "redis:alpine"
    container_name: etl-research-cache
    command: redis-server --save "" --appendonly no
    restart: always

networks:
  default:
    name: etl-research-network
