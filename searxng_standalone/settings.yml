use_default_settings: true

server:
  base_url: http://localhost:8080/
  port: 8080
  bind_address: "0.0.0.0"
  secret_key: "978216fc65d3a1b2c4e5f60718293a4b" # Fallback key
  image_proxy: true

search:
  safe_search: 1
