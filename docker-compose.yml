services:
  video-factory:
    build: .
    container_name: autonomous-video-factory
    ports:
      - "${PORT:-8000}:8000"
    env_file:
      - .env
    volumes:
      - ./output:/app/output
      - ./factory_vector_db:/app/factory_vector_db
      - ./factory_knowledge:/app/factory_knowledge
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    depends_on:
      - redis

  redis:
    image: redis:7-alpine
    container_name: factory-cache
    ports:
      - "6379:6379"
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    restart: unless-stopped
