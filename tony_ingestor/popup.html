<!DOCTYPE html>
<html>
<head>
  <style>
    body { width: 300px; font-family: sans-serif; padding: 15px; background: #1a1a1a; color: white; }
    h2 { font-size: 16px; margin: 0 0 10px 0; color: #ffcc00; }
    button { 
      background: #ffcc00; color: black; border: none; padding: 10px; width: 100%; cursor: pointer; font-weight: bold; border-radius: 5px; 
    }
    button:hover { background: #e6b800; }
    #status { margin-top: 10px; font-size: 12px; opacity: 0.8; }
  </style>
</head>
<body>
  <h2>🛡️ Tony Ingestor</h2>
  <button id="captureBtn">📸 Capture Lesson</button>
  <div id="manualArea" style="display:none; margin-top:10px;">
    <p style="font-size:10px; opacity:0.7;">Or paste the HTML/JSON here:</p>
    <textarea id="manualInput" rows="4" style="width:100%; background:#333; color:white; border:1px solid #444; border-radius:3px; font-size:10px;"></textarea>
    <button id="manualBtn" style="margin-top:5px; padding:5px; font-size:12px;">🚀 Render Manual</button>
  </div>
  <div id="status">Ready to capture...</div>
  <script src="popup.js"></script>
</body>
</html>
