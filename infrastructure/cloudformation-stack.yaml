AWSTemplateFormatVersion: '2010-09-09'
Description: 'EaseToLearn Video Generation Factory - Production Stack'

Parameters:
  ProjectName:
    Type: String
    Default: easetolearn-factory
  Environment:
    Type: String
    Default: production
  VpcCIDR:
    Type: String
    Default: 10.0.0.0/16
  CertificateArn:
    Type: String
    Default: ''
    Description: 'ACM Certificate ARN for HTTPS. Leave empty for HTTP-only (v1).'

Conditions:
  HasCertificate: !Not [ !Equals [ !Ref CertificateArn, '' ] ]

Resources:
  # ── Networking ──
  VPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: !Ref VpcCIDR
      EnableDnsSupport: true
      EnableDnsHostnames: true
      Tags:
        - Key: Name
          Value: !Sub '${ProjectName}-vpc'

  PublicSubnet1:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: 10.0.1.0/24
      AvailabilityZone: !Select [ 0, !GetAZs '' ]
      MapPublicIpOnLaunch: true

  PublicSubnet2:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: 10.0.2.0/24
      AvailabilityZone: !Select [ 1, !GetAZs '' ]
      MapPublicIpOnLaunch: true

  InternetGateway:
    Type: AWS::EC2::InternetGateway

  VPCGatewayAttachment:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref VPC
      InternetGatewayId: !Ref InternetGateway

  PublicRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VPC

  DefaultPublicRoute:
    Type: AWS::EC2::Route
    DependsOn: VPCGatewayAttachment
    Properties:
      RouteTableId: !Ref PublicRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref InternetGateway

  PublicSubnet1RouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      RouteTableId: !Ref PublicRouteTable
      SubnetId: !Ref PublicSubnet1

  PublicSubnet2RouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      RouteTableId: !Ref PublicRouteTable
      SubnetId: !Ref PublicSubnet2

  # ── Security Groups ──
  ALBSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Enable HTTP/HTTPS access
      VpcId: !Ref VPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 0.0.0.0/0
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          CidrIp: 0.0.0.0/0

  ECSSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Allow access from ALB on port 8000
      VpcId: !Ref VPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 8000
          ToPort: 8000
          SourceSecurityGroupId: !Ref ALBSecurityGroup

  EFSSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Allow NFS access from ECS
      VpcId: !Ref VPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 2049
          ToPort: 2049
          SourceSecurityGroupId: !Ref ECSSecurityGroup

  RedisSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Allow Redis access from ECS
      VpcId: !Ref VPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 6379
          ToPort: 6379
          SourceSecurityGroupId: !Ref ECSSecurityGroup

  # ── EFS Storage ──
  FileSystem:
    Type: AWS::EFS::FileSystem
    Properties:
      PerformanceMode: generalPurpose
      FileSystemTags:
        - Key: Name
          Value: !Sub '${ProjectName}-efs'

  MountTarget1:
    Type: AWS::EFS::MountTarget
    Properties:
      FileSystemId: !Ref FileSystem
      SubnetId: !Ref PublicSubnet1
      SecurityGroups: [ !Ref EFSSecurityGroup ]

  MountTarget2:
    Type: AWS::EFS::MountTarget
    Properties:
      FileSystemId: !Ref FileSystem
      SubnetId: !Ref PublicSubnet2
      SecurityGroups: [ !Ref EFSSecurityGroup ]

  # ── Redis (ElastiCache) ──
  RedisSubnetGroup:
    Type: AWS::ElastiCache::SubnetGroup
    Properties:
      Description: Subnet group for factory Redis
      SubnetIds: [ !Ref PublicSubnet1, !Ref PublicSubnet2 ]

  RedisCluster:
    Type: AWS::ElastiCache::ReplicationGroup
    Properties:
      ReplicationGroupDescription: Factory Redis with encryption
      CacheNodeType: cache.t4g.micro
      Engine: redis
      EngineVersion: '7.0'
      NumCacheClusters: 1
      CacheSubnetGroupName: !Ref RedisSubnetGroup
      VpcSecurityGroupIds: [ !Ref RedisSecurityGroup ]
      TransitEncryptionEnabled: true
      AtRestEncryptionEnabled: true

  # ── Load Balancer ──
  LoadBalancer:
    Type: AWS::ElasticLoadBalancingV2::LoadBalancer
    Properties:
      Subnets: [ !Ref PublicSubnet1, !Ref PublicSubnet2 ]
      SecurityGroups: [ !Ref ALBSecurityGroup ]

  TargetGroup:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties:
      HealthCheckIntervalSeconds: 30
      HealthCheckPath: /health
      HealthCheckProtocol: HTTP
      HealthCheckTimeoutSeconds: 5
      HealthyThresholdCount: 2
      UnhealthyThresholdCount: 2
      Matcher: { HttpCode: '200' }
      Port: 8000
      Protocol: HTTP
      TargetType: ip
      VpcId: !Ref VPC

  HttpListener:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Properties:
      DefaultActions:
        - !If
          - HasCertificate
          - Type: redirect
            RedirectConfig:
              Protocol: HTTPS
              Port: '443'
              StatusCode: HTTP_301
          - Type: forward
            TargetGroupArn: !Ref TargetGroup
      LoadBalancerArn: !Ref LoadBalancer
      Port: 80
      Protocol: HTTP

  HttpsListener:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Condition: HasCertificate
    Properties:
      DefaultActions:
        - Type: forward
          TargetGroupArn: !Ref TargetGroup
      LoadBalancerArn: !Ref LoadBalancer
      Port: 443
      Protocol: HTTPS
      Certificates:
        - CertificateArn: !Ref CertificateArn

  # ── Secrets Manager ──
  FactorySecrets:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: factory-keys
      Description: 'API Keys for EaseToLearn Video Generation Service'
      SecretString: '{"ANTHROPIC_API_KEY": "PLACEHOLDER", "GROQ_API_KEY": "PLACEHOLDER", "GEMINI_API_KEY": "PLACEHOLDER", "ELEVENLABS_API_KEY": "PLACEHOLDER", "HEYGEN_API_KEY": "PLACEHOLDER", "HIGGSFIELD_API_KEY": "PLACEHOLDER", "FACTORY_API_KEY": "PLACEHOLDER", "REDIS_URL": "PLACEHOLDER"}'

  # ── Logging ──
  LogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub '/ecs/${ProjectName}'
      RetentionInDays: 7

  # ── Storage (S3) ──
  VideoBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub '${ProjectName}-videos-${AWS::AccountId}'
      PublicAccessBlockConfiguration:
        BlockPublicAcls: false
        BlockPublicPolicy: false
        IgnorePublicAcls: false
        RestrictPublicBuckets: false
      Tags:
        - Key: Name
          Value: !Sub '${ProjectName}-videos'

  VideoBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref VideoBucket
      PolicyDocument:
        Statement:
          - Sid: PublicReadAccess
            Effect: Allow
            Principal: '*'
            Action: 's3:GetObject'
            Resource: !Sub '${VideoBucket.Arn}/*'


  # ── IAM Roles ──
  ECSTaskExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: [ecs-tasks.amazonaws.com]
            Action: ['sts:AssumeRole']
      ManagedPolicyArns:
        - 'arn:aws:iam::aws:policy/service-role/AmazonECSTaskExecutionRolePolicy'
      Policies:
        - PolicyName: SecretsManagerAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: ['secretsmanager:GetSecretValue']
                Resource: [!Ref FactorySecrets]

  ECSTaskRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: [ecs-tasks.amazonaws.com]
            Action: ['sts:AssumeRole']
      Policies:
        - PolicyName: S3Access
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: ['s3:PutObject', 's3:GetObject', 's3:ListBucket', 's3:GetBucketLocation']
                Resource: 
                  - !GetAtt VideoBucket.Arn
                  - !Sub '${VideoBucket.Arn}/*'


  ECSCluster:
    Type: AWS::ECS::Cluster
    Properties:
      ClusterName: !Sub '${ProjectName}-cluster'

  # ── ECS Bootstrap (Needed for initial Stack creation) ──
  BootstrapTaskDefinition:
    Type: AWS::ECS::TaskDefinition
    Properties:
      Family: !Sub '${ProjectName}-bootstrap'
      Cpu: '256'
      Memory: '512'
      NetworkMode: awsvpc
      RequiresCompatibilities: [FARGATE]
      ExecutionRoleArn: !GetAtt ECSTaskExecutionRole.Arn
      ContainerDefinitions:
        - Name: factory-fastapi
          Image: public.ecr.aws/amazonlinux/amazonlinux:latest
          Command: ["/bin/sh", "-c", "echo 'Bootstrap complete. Waiting for real deploy...'; sleep 3600"]
          PortMappings:
            - ContainerPort: 8000

  # ── ECS Service ──
  ECSService:
    Type: AWS::ECS::Service
    DependsOn: HttpListener
    Properties:
      ServiceName: factory-service
      Cluster: !Ref ECSCluster
      LaunchType: FARGATE
      TaskDefinition: !Ref BootstrapTaskDefinition
      DesiredCount: 1
      DeploymentConfiguration:
        MaximumPercent: 200
        MinimumHealthyPercent: 100
      NetworkConfiguration:
        AwsvpcConfiguration:
          AssignPublicIp: ENABLED
          Subnets: [ !Ref PublicSubnet1, !Ref PublicSubnet2 ]
          SecurityGroups: [ !Ref ECSSecurityGroup ]
      LoadBalancers:
        - ContainerName: factory-fastapi
          ContainerPort: 8000
          TargetGroupArn: !Ref TargetGroup


Outputs:
  ALBDNSName:
    Description: The DNS name of the ALB
    Value: !GetAtt LoadBalancer.DNSName
  EFSFileSystemId:
    Description: FileSystem ID for ecs-task-def setup
    Value: !Ref FileSystem
  ECSTaskExecutionRoleArn:
    Value: !GetAtt ECSTaskExecutionRole.Arn
  ECSTaskRoleArn:
    Value: !GetAtt ECSTaskRole.Arn
  SecretArn:
    Value: !Ref FactorySecrets
  VideoBucketName:
    Value: !Ref VideoBucket
  LogGroupName:
    Value: !Ref LogGroup
  RedisEndpoint:
    Description: Redis primary endpoint for secret wiring
    Value: !GetAtt RedisCluster.PrimaryEndPoint.Address
  ALBHttpListenerArn:
    Description: HTTP Listener ARN
    Value: !Ref HttpListener
  ALBHttpsListenerArn:
    Description: HTTPS Listener ARN (only when certificate is provided)
    Condition: HasCertificate
    Value: !Ref HttpsListener
  ECSServiceName:
    Description: ECS Service name for deploy script
    Value: !GetAtt ECSService.Name

