services:
  # ── The Heart: Video Factory API ────────────────────────────────────────────
  factory-api:
    build: .
    ports:
      - "8000:8000"
    environment:
      - SEARXNG_URL=${SEARXNG_URL:-http://localhost:8080}
      - GROQ_API_KEY=${GROQ_API_KEY}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - ELEVENLABS_API_KEY=${ELEVENLABS_API_KEY}
      - HEYGEN_API_KEY=${HEYGEN_API_KEY}
      - HIGGSFIELD_API_KEY=${HIGGSFIELD_API_KEY}
      - MANIM_MEDIA_DIR=/app/output
    volumes:
      - ./output:/app/output # Persist renders on host machine
    restart: always

  # ── The Brain: SearXNG Research Engine (DECOUPLED) ──────────────────────────
  # Note: Move to searxng_standalone/ for dedicated deployment on Mac Mini.
  # The Factory now connects via the SEARXNG_URL env var.

networks:
  default:
    name: easetolearn-network
