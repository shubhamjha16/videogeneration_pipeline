version: '3.8'

services:
  # ── The Heart: Video Factory API ────────────────────────────────────────────
  factory-api:
    build: .
    container_name: easetolearn-factory-api
    ports:
      - "8000:8000"
    environment:
      - SEARXNG_URL=http://searxng:8080
      - REDIS_URL=redis://redis:6379/0
      - DATABASE_URL=postgresql+psycopg2://root:localdev@postgres:5432/etl_video_generation
      - RABBITMQ_HOST=rabbitmq
      - RABBITMQ_USER=etl
      - RABBITMQ_PASS=localdev
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
      - ENV=dev
      - GROQ_API_KEY=${GROQ_API_KEY}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - ELEVENLABS_API_KEY=${ELEVENLABS_API_KEY}
      - HEYGEN_API_KEY=${HEYGEN_API_KEY}
      - HIGGSFIELD_API_KEY=${HIGGSFIELD_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - MANIM_MEDIA_DIR=/app/output
    volumes:
      - ./output:/app/output # Persist renders on host machine
      - ./jobs.json:/app/jobs.json # Persist job state
    depends_on:
      redis:
        condition: service_healthy
      searxng:
        condition: service_started
      postgres:
        condition: service_started
      rabbitmq:
        condition: service_healthy
      qdrant:
        condition: service_started
    restart: always

  # ── The Memory: Redis Cache ─────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: easetolearn-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: always

  # ── The Brain: SearXNG Research Engine ──────────────────────────────────────
  searxng:
    build: ./searxng_standalone
    container_name: easetolearn-searxng
    env_file: ./searxng_standalone/.env
    ports:
      - "8080:8080"
    restart: always

  # ── The Persistence: PostgreSQL Database ─────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: easetolearn-postgres
    environment:
      - POSTGRES_USER=root
      - POSTGRES_PASSWORD=localdev
      - POSTGRES_DB=etl_video_generation
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - default
    restart: always

  # ── The Message Bus: RabbitMQ ──────────────────────────────────────────────
  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: easetolearn-rabbitmq
    environment:
      - RABBITMQ_DEFAULT_USER=etl
      - RABBITMQ_DEFAULT_PASS=localdev
      - RABBITMQ_DEFAULT_VHOST=/
    ports:
      - "5672:5672"    # AMQP
      - "15672:15672"  # Management UI (http://localhost:15672)
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 15s
      timeout: 10s
      retries: 5
    restart: always

  # ── The Knowledge Layer: Qdrant Vector Database ───────────────────────────
  qdrant:
    image: qdrant/qdrant:v1.9.3
    container_name: easetolearn-qdrant
    ports:
      - "6333:6333"   # HTTP / gRPC API
    volumes:
      - qdrant_data:/qdrant/storage
    restart: always

volumes:
  redis_data:
  postgres_data:
  rabbitmq_data:
  qdrant_data:

networks:
  default:
    name: easetolearn-network
