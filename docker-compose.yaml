version: '3.8'

services:
  # ── The Heart: Video Factory API ────────────────────────────────────────────
  factory-api:
    build: .
    container_name: easetolearn-factory-api
    ports:
      - "8000:8000"
    environment:
      - SEARXNG_URL=http://searxng:8080
      - REDIS_URL=redis://redis:6379/0
      - GROQ_API_KEY=${GROQ_API_KEY}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - ELEVENLABS_API_KEY=${ELEVENLABS_API_KEY}
      - HEYGEN_API_KEY=${HEYGEN_API_KEY}
      - HIGGSFIELD_API_KEY=${HIGGSFIELD_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - MANIM_MEDIA_DIR=/app/output
    volumes:
      - ./output:/app/output # Persist renders on host machine
      - ./jobs.json:/app/jobs.json # Persist job state
    depends_on:
      redis:
        condition: service_healthy
      searxng:
        condition: service_started
    restart: always

  # ── The Memory: Redis Cache ─────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: easetolearn-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: always

  # ── The Brain: SearXNG Research Engine ──────────────────────────────────────
  searxng:
    build: ./searxng_standalone
    container_name: easetolearn-searxng
    env_file: ./searxng_standalone/.env
    ports:
      - "8080:8080"
    restart: always

volumes:
  redis_data:

networks:
  default:
    name: easetolearn-network
