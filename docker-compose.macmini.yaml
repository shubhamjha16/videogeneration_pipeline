# =============================================================================
# EaseToLearn Video Factory — Mac Mini Staging Stack
# -----------------------------------------------------------------------------
# Internal staging only. Reached over WireGuard. NOT student-facing.
#
# Written as a deliberate MIRROR of the AWS Fargate task definition:
#   - The factory-api container is IDENTICAL to what ships to AWS.
#   - The ONLY differences vs production are:
#       (a) ENV=dev
#       (b) S3_BUCKET unset  -> local /stream storage, no S3 cost
#       (c) sidecars run as containers here instead of managed AWS services
#   - Migrating to AWS = repoint the env vars + flip ENV + set S3_BUCKET.
#     No code change. No image change.
# =============================================================================

services:

  # ── Video Factory API ───────────────────────────────────────────────────────
  factory-api:
    build: .
    image: easetolearn-factory-api:latest
    container_name: etl-factory-api-macmini
    ports:
      - "8000:8000"
    environment:
      # --- Environment ---
      - ENV=dev                               # AWS: production
      - DISABLE_MQ_CONSUMER=true              # Standalone API: do not start consumer thread
      # --- Storage (local SSD; no S3 cost while internal) ---
      - LOCAL_CDN_URL=${LOCAL_CDN_URL}        # MUST be the Mini's WireGuard URL
      - MANIM_MEDIA_DIR=/app/output
      # --- Data plane ---
      - DATABASE_URL=postgresql+psycopg2://etl:${POSTGRES_PASSWORD}@postgres:5432/etl_video_generation
      - REDIS_URL=redis://redis:6379/0
      - SEARXNG_URL=http://searxng:8080
      - RABBITMQ_HOST=rabbitmq
      - RABBITMQ_USER=${RABBITMQ_USER}
      - RABBITMQ_PASS=${RABBITMQ_PASS}
      - RABBITMQ_VHOST=${RABBITMQ_VHOST:-/}
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
      - QDRANT_API_KEY=${QDRANT_API_KEY:-}
      # --- Integration security ---
      - FACTORY_API_KEY=${FACTORY_API_KEY}
      - FACTORY_WEBHOOK_SECRET=${FACTORY_WEBHOOK_SECRET}
      # --- Provider keys ---
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - GROQ_API_KEY=${GROQ_API_KEY}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - ELEVENLABS_API_KEY=${ELEVENLABS_API_KEY}
      - HEYGEN_API_KEY=${HEYGEN_API_KEY}
      - HIGGSFIELD_API_KEY=${HIGGSFIELD_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    volumes:
      - ./output:/app/output
      - ./jobs.json:/app/jobs.json
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      qdrant:
        condition: service_started
      searxng:
        condition: service_started
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 3G
        reservations:
          cpus: '1.0'
          memory: 1.5G
    restart: always

  # ── Video Factory Queue Worker ──────────────────────────────────────────────
  factory-worker:
    image: easetolearn-factory-api:latest
    container_name: etl-factory-worker-macmini
    command: python3 mq/worker_entrypoint.py
    environment:
      # --- Environment ---
      - ENV=dev
      - MANIM_MEDIA_DIR=/app/output
      # --- Data plane ---
      - DATABASE_URL=postgresql+psycopg2://etl:${POSTGRES_PASSWORD}@postgres:5432/etl_video_generation
      - REDIS_URL=redis://redis:6379/0
      - SEARXNG_URL=http://searxng:8080
      - RABBITMQ_HOST=rabbitmq
      - RABBITMQ_USER=${RABBITMQ_USER}
      - RABBITMQ_PASS=${RABBITMQ_PASS}
      - RABBITMQ_VHOST=${RABBITMQ_VHOST:-/}
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
      - QDRANT_API_KEY=${QDRANT_API_KEY:-}
      # --- Integration security ---
      - FACTORY_API_KEY=${FACTORY_API_KEY}
      - FACTORY_WEBHOOK_SECRET=${FACTORY_WEBHOOK_SECRET}
      # --- Provider keys ---
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - GROQ_API_KEY=${GROQ_API_KEY}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - ELEVENLABS_API_KEY=${ELEVENLABS_API_KEY}
      - HEYGEN_API_KEY=${HEYGEN_API_KEY}
      - HIGGSFIELD_API_KEY=${HIGGSFIELD_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    volumes:
      - ./output:/app/output
      - ./jobs.json:/app/jobs.json
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      qdrant:
        condition: service_started
      searxng:
        condition: service_started
    deploy:
      resources:
        limits:
          cpus: '3.0'
          memory: 5G
        reservations:
          cpus: '1.5'
          memory: 2.5G
    restart: always
    healthcheck:
      disable: true

  # ── Relational DB (container now -> RDS on AWS via DATABASE_URL) ────────────
  postgres:
    image: postgres:16-alpine
    container_name: etl-postgres-macmini
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=etl
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=etl_video_generation
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U etl -d etl_video_generation"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always

  # ── Cache (container now -> ElastiCache on AWS via REDIS_URL) ───────────────
  redis:
    image: redis:7-alpine
    container_name: etl-redis-macmini
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: always

  # ── Job bus (container now -> Amazon MQ on AWS via RABBITMQ_HOST) ───────────
  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: etl-rabbitmq-macmini
    hostname: rabbitmq
    environment:
      - RABBITMQ_DEFAULT_USER=${RABBITMQ_USER}
      - RABBITMQ_DEFAULT_PASS=${RABBITMQ_PASS}
      - RABBITMQ_ERLANG_COOKIE=etl_staging_cookie
    ports:
      - "5672:5672"
      - "15672:15672"   # management UI — useful for watching the job bus during staging
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 15s
      timeout: 10s
      retries: 5
    restart: always

  # ── Vector DB (container now -> Qdrant on ECS on AWS via QDRANT_HOST) ───────
  qdrant:
    image: qdrant/qdrant:latest
    container_name: etl-qdrant-macmini
    volumes:
      - qdrant_data:/qdrant/storage
    restart: always

  # ── Search (sidecar now AND on AWS via SEARXNG_URL) ─────────────────────────
  searxng:
    build: ./searxng_standalone
    container_name: etl-searxng-macmini
    environment:
      - SEARXNG_SECRET=easetolearnvideogenerationfactorysecretkeysecret
    restart: always

volumes:
  postgres_data:
  redis_data:
  rabbitmq_data:
  qdrant_data:

networks:
  default:
    name: easetolearn-macmini-network
